# Hermes Agent Configuration
spring.application.name=hermes-agent

# ============================================================
# Alibaba Cloud Bailian (DashScope) LLM Configuration
# ============================================================
hermes.api-base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
hermes.api-key=xx
# Default model (qwen-plus recommended for balance)
hermes.default-model=qwen-plus

hermes.default-provider=dashscope
hermes.max-history=50
hermes.max-tokens=4096
hermes.temperature=0.7
hermes.stream-enabled=true

# Redis Configuration (optional, for persistent memory)
hermes.redis.host=127.0.0.1
hermes.redis.port=6379
hermes.redis.database=7
# hermes.redis.password=your-redis-password

# ── Persistence ───────────────────────────────────────────────────────────────────
# 数据持久化目录（默认 {user.home}/.hermes/data）
hermes.data-dir=C:\.hermes

# Server
server.port=8993
spring.codec.max-in-memory-size=10MB

# ── Async request timeout ───────────────────────────────────
# Extended to 120s to allow multi-turn LLM tool-call rounds
# (each Bing search may take up to 12s in China)
spring.mvc.async.request-timeout=120s
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10

# Logging
logging.level.com.hermes.agent=INFO
logging.level.reactor.netty=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
